<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 朋友专属版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none;
        }
        h1 {
            margin-bottom: 10px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            color: #0f0;
        }
        canvas {
            border: 2px solid #0ff;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            max-width: 90vw;
        }
        #info {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }
        #restart {
            display: none;
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background: #0ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #restart:active { transform: scale(0.95); }
        #mobileControls {
            display: none;
            margin-top: 15px;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 8px;
        }
        #mobileControls button {
            width: 60px; height: 60px;
            font-size: 24px;
            border: 2px solid #0ff;
            background: rgba(0,255,255,0.1);
            color: #0ff;
            border-radius: 50%;
            cursor: pointer;
        }
        #mobileControls button:active { background: rgba(0,255,255,0.3); }
        #upBtn { grid-area: up; }
        #downBtn { grid-area: down; }
        #leftBtn { grid-area: left; }
        #rightBtn { grid-area: right; }
        @media (pointer: coarse) {
            #mobileControls { display: grid; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div id="score">得分: 0 &nbsp;|&nbsp; 最高: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <button id="restart" onclick="restart()">再来一局</button>
    <div id="mobileControls">
        <button id="upBtn" onclick="setDir(0,-1)">▲</button>
        <button id="leftBtn" onclick="setDir(-1,0)">◀</button>
        <button id="rightBtn" onclick="setDir(1,0)">▶</button>
        <button id="downBtn" onclick="setDir(0,1)">▼</button>
    </div>
    <div id="info">电脑用方向键 / WASD &nbsp;•&nbsp; 手机滑动或点按钮</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const restartBtn = document.getElementById('restart');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake, dir, nextDir, food, score, highScore, speed, gameLoop, gameOver;

        highScore = +(localStorage.getItem('snakeHigh') || 0);

        function init() {
            snake = [{x: 10, y: 10}];
            dir = {x: 1, y: 0};
            nextDir = {x: 1, y: 0};
            score = 0;
            speed = 120;
            gameOver = false;
            restartBtn.style.display = 'none';
            placeFood();
            updateScore();
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
            draw();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function setDir(x, y) {
            if (dir.x === -x && dir.y === -y) return;
            nextDir = {x, y};
        }

        function tick() {
            dir = nextDir;
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHigh', highScore);
                }
                updateScore();
                placeFood();
                if (speed > 60) {
                    speed -= 3;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                }
            } else {
                snake.pop();
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // food
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // snake
            snake.forEach((s, i) => {
                if (i === 0) {
                    ctx.fillStyle = '#0f0';
                } else {
                    ctx.fillStyle = `hsl(${120 + i * 3}, 70%, ${50 - i}%)`;
                }
                ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.fillText('得分: ' + score, canvas.width/2, canvas.height/2 + 25);
            }
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            restartBtn.style.display = 'block';
            draw();
        }

        function updateScore() {
            scoreEl.textContent = `得分: ${score}  |  最高: ${highScore}`;
        }

        function restart() { init(); }

        // Keyboard
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'arrowup' || k === 'w') setDir(0, -1);
            else if (k === 'arrowdown' || k === 's') setDir(0, 1);
            else if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
            else if (k === 'arrowright' || k === 'd') setDir(1, 0);
            else if (k === ' ' && gameOver) restart();
        });

        // Touch swipe
        let tx, ty;
        canvas.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tx;
            const dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        });

        init();
    </script>
</body>
</html>
